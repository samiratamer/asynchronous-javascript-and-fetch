<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pokemon Team Builder</title>
  <style>
    body {
      background-color: pink;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: Georgia, serif;
      padding: 30px;
    }

    #app {
      background: lavenderblush;
      border: 4px solid hotpink;
      border-radius: 20px;
      padding: 30px;
      width: 420px;
    }

    h2 {
      text-align: center;
      color: deeppink;
      font-size: 1.6rem;
      margin-top: 0;
    }

    #search-area {
      text-align: center;
      margin-bottom: 15px;
      color: deeppink;
      font-weight: bold;
    }

    #pokemon-input {
      border: 2px solid hotpink;
      border-radius: 20px;
      padding: 5px 12px;
      font-family: Georgia, serif;
      outline: none;
    }

    #find-btn {
      background-color: hotpink;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
    }

    #find-btn:hover {
      background-color: deeppink;
    }

    #pokemon-display {
      text-align: center;
      min-height: 180px;
    }

    #pokemon-display img {
      width: 150px;
    }

    #moves-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 10px 0;
    }

    #moves-area select {
      width: 100%;
      padding: 4px;
      border: 2px solid plum;
      border-radius: 10px;
      font-family: Georgia, serif;
    }

    #add-btn {
      display: block;
      margin: 10px auto;
      background-color: hotpink;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 22px;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
    }

    #add-btn:hover {
      background-color: deeppink;
    }

    #team-list {
      margin-top: 20px;
    }

    .team-entry {
      display: flex;
      align-items: center;
      border: 2px solid plum;
      border-radius: 12px;
      background-color: mistyrose;
      padding: 8px;
      margin-bottom: 8px;
      gap: 10px;
    }

    .team-entry img {
      width: 60px;
    }

    .team-entry ul {
      margin: 0;
      padding-left: 18px;
      font-size: 14px;
      color: purple;
    }
  </style>
</head>
<body>
<div id="app">
  <h2>✿ Pokemon Team Builder ✿</h2>

  <div id="search-area">
    <label>Name or ID<br>
      <input type="text" id="pokemon-input" />
      <button id="find-btn">Find</button>
    </label>
  </div>

  <div id="pokemon-display"></div>

  <div id="moves-area" style="display:none">
    <select id="move1"></select>
    <select id="move2"></select>
    <select id="move3"></select>
    <select id="move4"></select>
  </div>

  <button id="add-btn" style="display:none">Add to Team</button>

  <div id="team-list"></div>
</div>

<script>
  const cache = {};

  const findBtn = document.getElementById('find-btn');
  const addBtn = document.getElementById('add-btn');
  const movesArea = document.getElementById('moves-area');
  const display = document.getElementById('pokemon-display');

  let currentSprite = '';
  let currentName = '';

  findBtn.addEventListener('click', fetchPokemon);
  document.getElementById('pokemon-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchPokemon();
  });

  async function fetchPokemon() {
    const query = document.getElementById('pokemon-input').value.trim().toLowerCase();
    if (!query) return;

    display.innerHTML = '<p>Loading...</p>';
    movesArea.style.display = 'none';
    addBtn.style.display = 'none';

    try {
      let data;
      if (cache[query]) {
        data = cache[query];
      } else {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
        if (!res.ok) throw new Error('Pokemon not found');
        data = await res.json();
        cache[query] = data;
      }

      currentSprite = data.sprites.front_default;
      currentName = data.name;

      const img = document.createElement('img');
      img.src = currentSprite;
      img.alt = currentName;

      const cry = data.cries?.latest || data.cries?.legacy || '';
      const audio = document.createElement('audio');
      audio.controls = true;
      if (cry) {
        const source = document.createElement('source');
        source.src = cry;
        audio.appendChild(source);
      }

      display.innerHTML = '';
      display.appendChild(img);
      display.appendChild(document.createElement('br'));
      display.appendChild(audio);

      const moves = data.moves.map(m => m.move.name);
      ['move1','move2','move3','move4'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '';
        moves.forEach(move => {
          const opt = document.createElement('option');
          opt.value = move;
          opt.textContent = move;
          sel.appendChild(opt);
        });
      });

      movesArea.style.display = 'grid';
      addBtn.style.display = 'block';

    } catch (err) {
      display.innerHTML = `<p style="color:red;">${err.message}</p>`;
    }
  }

  addBtn.addEventListener('click', () => {
    const selectedMoves = [
      document.getElementById('move1').value,
      document.getElementById('move2').value,
      document.getElementById('move3').value,
      document.getElementById('move4').value,
    ];

    const entry = document.createElement('div');
    entry.className = 'team-entry';

    const img = document.createElement('img');
    img.src = currentSprite;
    img.alt = currentName;

    const ul = document.createElement('ul');
    selectedMoves.forEach(move => {
      const li = document.createElement('li');
      li.textContent = move;
      ul.appendChild(li);
    });

    entry.appendChild(img);
    entry.appendChild(ul);
    document.getElementById('team-list').appendChild(entry);
  });
</script>
</body>
</html>
